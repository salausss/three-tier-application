# ── Backend Service (ClusterIP — reached by frontend via nginx proxy) ──
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: app
  labels:
    app: taskflow
    tier: backend
spec:
  selector:
    app: taskflow
    tier: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP



# ── Backend Service (ClusterIP — reached by frontend via nginx proxy) ──
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: app
  labels:
    app: taskflow
    tier: backend
spec:
  selector:
    app: taskflow
    tier: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
# ── HorizontalPodAutoscaler for backend ──────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

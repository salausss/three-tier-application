# ── NetworkPolicy: Tier Isolation ────────────────────────────────
# Enforces: frontend → backend only, backend → postgres only
# Requires a CNI that supports NetworkPolicy (VPC CNI supports it)

# Frontend pods: only accept ingress from ALB (all, since ALB uses node IPs)
# and allow egress to backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-netpol
  namespace: app
spec:
  podSelector:
    matchLabels:
      tier: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}   # Allow all ingress (ALB health checks + traffic)
  egress:
    - to:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - port: 3000
    - to:
        - namespaceSelector: {}  # Allow DNS
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Backend pods: accept from frontend, send to postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-netpol
  namespace: app
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: frontend
      ports:
        - port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              tier: database
      ports:
        - port: 5432
    - to:
        - namespaceSelector: {}  # DNS
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Postgres: only accept from backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-netpol
  namespace: app
spec:
  podSelector:
    matchLabels:
      tier: database
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - port: 5432
  egress:
    - {}   # Allow all egress for DB (backups, etc.)

# ── Backend Deployment ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app
  labels:
    app: taskflow
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: taskflow
        tier: backend
    spec:
      serviceAccountName: taskflow-app-sa

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: tier
                      operator: In
                      values: ["backend"]
                topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30

      volumes:
        - name: app-secrets-vol
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: taskflow-app-secrets

      containers:
        - name: backend
          image: 929861724743.dkr.ecr.ap-south-1.amazonaws.com/backend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000
              name: http

          # Non-secret config
          envFrom:
            - configMapRef:
                name: taskflow-config

            # ✅ DB secrets from CSI-created K8s secret
            - secretRef:
                name: taskflow-db-credentials

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

          volumeMounts:
            - name: app-secrets-vol
              mountPath: /mnt/secrets
              readOnly: true
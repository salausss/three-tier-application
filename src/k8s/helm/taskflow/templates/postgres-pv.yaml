# ── PostgreSQL PersistentVolumeClaim ─────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: db
  labels:
    app: taskflow
    tier: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2   # EKS default StorageClass — change to gp3 if you have it
  resources:
    requests:
      storage: 5Gi
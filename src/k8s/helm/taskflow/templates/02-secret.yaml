# ── IMPORTANT ────────────────────────────────────────────────────
# Values below are base64 encoded. Encode your own with:
#   echo -n "your-password" | base64
#
# Defaults here:
#   POSTGRES_PASSWORD = taskflow-secret-2024
#   POSTGRES_USER     = taskflow
#   POSTGRES_DB       = taskflow
#
# In production: use AWS Secrets Manager + External Secrets Operator
# instead of storing secrets in this file.
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-db-secret
  namespace: app
  labels:
    app: taskflow
type: Opaque
data:
  # taskflow-secret-2024
  POSTGRES_PASSWORD: dGFza2Zsb3ctc2VjcmV0LTIwMjQ=
  # taskflow
  POSTGRES_USER: dGFza2Zsb3c=
  # taskflow
  POSTGRES_DB: dGFza2Zsb3c=
  # taskflow (same value used by backend as DB_PASSWORD)
  DB_PASSWORD: dGFza2Zsb3ctc2VjcmV0LTIwMjQ=

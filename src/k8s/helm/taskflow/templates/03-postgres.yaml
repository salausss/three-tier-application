apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: db
  labels:
    app: taskflow
    tier: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: taskflow
      tier: database
  template:
    metadata:
      labels:
        app: taskflow
        tier: database
    spec:
      serviceAccountName: taskflow-db-sa
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsUser: 999        # postgres user inside the image
        runAsGroup: 999
        fsGroup: 999          # ensures PVC is owned by postgres user

      # Creates the replication user on first startup
      #initContainers:
      #  - name: init-replication-user
      #    image: postgres:16-alpine
      #    securityContext:
      #      runAsUser: 999    # initContainer also must not be root
      #      runAsGroup: 999
      #    env:
      #      - name: POSTGRES_PASSWORD
      #        valueFrom:
      #          secretKeyRef:
      #            name: taskflow-db-credentials
      #            key: POSTGRES_PASSWORD
      #      - name: REPLICATOR_PASSWORD
      #        valueFrom:
      #          secretKeyRef:
      #            name: taskflow-db-credentials
      #            key: replicator_password
       #   command:
       #     - sh
       #     - -c
       #     - |
       #       # Write a SQL file that the main container will pick up
       #       cat > /docker-entrypoint-initdb.d/init-replication.sql <<EOF
       #       CREATE USER replicator WITH REPLICATION ENCRYPTED PASSWORD '${replicator_password}';
       #       EOF
       #   volumeMounts:
       #     - name: initdb
       #       mountPath: /docker-entrypoint-initdb.d

      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999  
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: taskflow-db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskflow-db-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: taskflow-db-credentials
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/postgres   # matches subPath
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
            - name: db-secrets-vol
              mountPath: /mnt/secrets
              readOnly: true
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: postgres-config
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          #command:
          #  - postgres
          #  - -c
          #  - config_file=/etc/postgresql/postgresql.conf
          #  - -c
          #  - hba_file=/etc/postgresql/pg_hba.conf
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "taskflow", "-d", "taskflow"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "taskflow", "-d", "taskflow"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3

      volumes:
        - name: db-secrets-vol
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: taskflow-db-secrets
        - name: postgres-config
          configMap:
            name: postgres-config
        - name: initdb
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2
        resources:
          requests:
            storage: 5Gi